        <section id="campo">

                <div id="campos">


                <label for="email">Email*</label>
                <input type="email" name="email" id="email" class="input01"placeholder="Digite seu Email" maxlength="25" required>
                    
                <label for="cpf">CPF*</label>
                <input type="number" name="cpf" id="cpf" class="input02"placeholder="Digite seu CPF" maxlength="14" required>
        
        
                <label for="senha">Senha*</label>
                <input type="text" name="senha" id="senha" class="input03"placeholder="Digite sua Senha" maxlength="20" required>
                </div>

                <div id="btn">
                    <button id="sibmit" class="btn-1">Login</button>
                    <button id="limpar" class="btn-2">Limpar</button>
                </div>
