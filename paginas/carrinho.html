<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/syle_carrinho.css".css">
    <link rel="shortcut icon" href="../imagens/icones/favicon.ico" type="image/x-icon">
</head>
<body>

<main id="geral">

    <header id="cabecalho">

        <div id="logo">
            Sua Loja
        </div>

        <nav id="menu">
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>

    </header>


    <section id="titulo">
        <h1>Meu Carrinho</h1>
    </section>


    <section id="carrinho">

        <div id="lista-produtos">

            <div class="produto">

                <div class="imagem">
                    <img src="../imagens/produtos/produto1.jpg" alt="">
                </div>

                <div class="informacoes">

                    <h2>Kit Limpeza Geral</h2>

                    <p>Preço: <strong>R$ 60,00</strong></p>

                    <div class="quantidade">

                        <button>-</button>

                        <input type="number" value="1" min="1">

                        <button>+</button>

                    </div>

                </div>

                <button class="remover">
                    Remover
                </button>

            </div>



            <div class="produto">

                <div class="imagem">
                    <img src="../imagens/produtos/produto2.jpg" alt="">
                </div>

                <div class="informacoes">

                    <h2>Kit Limpeza Vidros</h2>

                    <p>Preço: <strong>R$ 60,00</strong></p>

                    <div class="quantidade">

                        <button>-</button>

                        <input type="number" value="2" min="1">

                        <button>+</button>

                    </div>

                </div>

                <button class="remover">
                    Remover
                </button>

            </div>

        </div>



        <aside id="resumo">

            <h2>Resumo da Compra</h2>

            <hr>

            <p>Produtos <span>R$ 180,00</span></p>

            <p>Frete <span>Grátis</span></p>

            <hr>

            <h3>Total <span>R$ 180,00</span></h3>

            <button id="finalizar">
                Finalizar Compra
            </button>

        </aside>

    </section>

</main>

</body>
</html>
